project_name: clinc150-intent-tinker
run_name: lora_base_experiment

model:
  base_model: meta-llama/Llama-3.2-1B
  lora_rank: 32

training:
  seed: 42
  batch_size: 16
  grad_accum_steps: 8
  learning_rate: 5.0e-4
  num_epochs: 2
  max_train_examples: 4000
  max_val_examples: 1000
  eval_every_steps: 50
  save_every_steps: 100

paths:
  train_file: data/processed/train.jsonl
  val_file: data/processed/val.jsonl
  test_file: data/processed/test.jsonl
  output_dir: results/runs/lora_base_experiment

prompt:
  include_label_list_in_user_prompt: true
  strict_output: true
  include_oos: false